model:
  name: 'B5'
  num_classes: 9
  pretrained: true
  feature_dim: 2048
  hidden_dim: 512

training:
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 10
  optimizer: "Adam"
  scheduler: "ReduceLROnPlateau"
  scheduler_mode: "min"
  patience: 10
  min_lr: 1e-6
  scheduler_factor: 0.5
  scheduler_patience: 5
  num_workers: 2
  pin_memory: true

data:
  annot_path: "src/dataset/annot_all.pkl"
  videos_path: "data/videos_dataset"
  num_frames: 9
  num_players: 12

  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

experiment:
  seed: 42
  name: "B5_resnet50_lstm_players"