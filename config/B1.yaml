# Baseline B1.yml
model:
  name: 'B1'
  backbone: "resnet50"
  num_classes: 8
  num_classes_label: ["l-pass", "r-pass", "l-spike", "r-spike", "l-set", "r-set", "l-winpoint", "r-winpoint"]
  pretrained: true

training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0005
  epochs: 50
  optimizer: "Adam"
  scheduler: "ReduceLROnPlateau"
  scheduler_mode: "max"
  scheduler_factor: 0.5
  scheduler_patience: 5
  gradient_clip: 1.0
  num_workers: 4
  pin_memory: true

data:
  dataset_name: "VolleyBallFeaturesDataset"
  data_dir: "data"
  annot_path: "src/dataset/annot_all.pkl"
  videos_path: "data/videos_dataset"
  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

experiment:
  name: "Baseline_B1"
  version: 1
  seed: 42
  output_dir: "outputs"
  device: "cuda"
  checkpoint_path: "best_model.pth"
  final_model_path: "B1.pth"
  save_interval: 5
  description: "Single-frame ResNet50 baseline for group activity recognition"
