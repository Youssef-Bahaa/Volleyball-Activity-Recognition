model:
  name: 'YOLO'
  base_weights: 'yolov8n.pt'
  num_classes: 1
  class_names: ['player']

dataset:
  videos_path: "/kaggle/input/datasets/sherif31/group-activity-recognition-volleyball/videos"
  tracking_annot_path: "/kaggle/input/datasets/sherif31/group-activity-recognition-volleyball/volleyball_tracking_annotation"
  output_path: "/kaggle/working/yolo_dataset"

  only_keyframe: true
  include_generated: true
  skip_lost: true
  copy_images: false

  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    val: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

training:
  epochs: 60
  imgsz: 640
  batch: 16
  patience: 15
  optimizer: 'AdamW'
  lr0: 0.001
  device: 0
  workers: 2
  seed: 42
  freeze: 0

experiment:
  name: "YOLO_player_detector"