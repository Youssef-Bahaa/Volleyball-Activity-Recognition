model:
  name: 'B3'
  num_classes: 8          # scene classes for phase 2
  pretrained: true

training:
  batch_size: 32
  learning_rate: 0.00002
  weight_decay: 0.01
  epochs: 150
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  scheduler_T_max: 300
  num_workers: 2
  pin_memory: true
  min_lr: 0.000001

data:
  annot_path: "src/dataset/annot_all.pkl"
  videos_path: "data/videos_dataset"
  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

experiment:
  seed: 42